name: TaskFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build and Test Backend
        run: ./gradlew clean :backend:test
        env:
          DATASOURCES_DEFAULT_URL: jdbc:postgresql://localhost:5432/taskflow
          DATASOURCES_DEFAULT_USERNAME: user
          DATASOURCES_DEFAULT_PASSWORD: password
          DATASOURCES_DEFAULT_DRIVER_CLASS_NAME: org.postgresql.Driver
          FLYWAY_DATASOURCES_DEFAULT_ENABLED: 'true'
          JPA_DEFAULT_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          JPA_DEFAULT_PROPERTIES_HIBERNATE_HBM2DDL_AUTO: none

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Run Frontend Tests
        run: cd frontend && npm test -- --run

  android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build and Test Android
        run: ./gradlew :android:assembleDebug :android:testDebugUnitTest